<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VTP Emina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
      body {
        background: #000;
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      }
      
      .scene {
  position: relative;
  width: 100vw;
  height: 100svh;
  overflow: hidden;
}

#ui {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 450px;
  height: 450px;
  transform: translate(-50%, -50%) scale(0.75);
  transform-origin: center;
}

@media (max-width: 480px) {
  #ui {
    transform: translate(-50%, -50%) scale(0.55);
  }
}
      
      #ui .love {
        position: absolute;
        top: 50%;
        left: 50%;
        --i: 1;
        margin-left: calc(var(--size) / -2);
        margin-top: calc(var(--size) / -2);
      }
      
      #ui .love_word {
        color: #ea80b0;
        font-size: clamp(1rem, 3vw, 1.4rem);
        transform: translateY(-100%) rotateZ(-30deg);
        text-shadow: 0 0 10px #fff;
        letter-spacing: 2px;
        white-space: nowrap;
      }
      
      #ui .love_horizontal {
        animation: horizontal 10000ms infinite alternate ease-in-out;
        animation-delay: calc(var(--i) * -300ms);
      }
      
      #ui .love_vertical {
        animation: vertical 20000ms infinite linear;
        animation-delay: calc(var(--i) * -300ms);
      }
      
      @keyframes horizontal {
        from { transform: translateX(0); }
        to   { transform: translateX(var(--size)); }
      }
      
      @keyframes vertical {
        0%   { transform: translateY(calc(var(--size) * 0.40)); }
        10%  { transform: translateY(calc(var(--size) * 0.10)); }
        15%  { transform: translateY(calc(var(--size) * 0.01)); }
        18%  { transform: translateY(0); }
        20%  { transform: translateY(calc(var(--size) * 0.01)); }
        22%  { transform: translateY(calc(var(--size) * 0.077)); }
        24%  { transform: translateY(calc(var(--size) * 0.143)); }
        25%  { transform: translateY(calc(var(--size) * 0.25)); }
        26%  { transform: translateY(calc(var(--size) * 0.143)); }
        28%  { transform: translateY(calc(var(--size) * 0.077)); }
        30%  { transform: translateY(calc(var(--size) * 0.01)); }
        32%  { transform: translateY(0); }
        35%  { transform: translateY(calc(var(--size) * 0.01)); }
        40%  { transform: translateY(calc(var(--size) * 0.10)); }
        50%  { transform: translateY(calc(var(--size) * 0.40)); }
        71%  { transform: translateY(calc(var(--size) * 0.952)); }
        72.5%{ transform: translateY(calc(var(--size) * 0.98)); }
        75%  { transform: translateY(var(--size)); }
        77.5%{ transform: translateY(calc(var(--size) * 0.98)); }
        79%  { transform: translateY(calc(var(--size) * 0.952)); }
        100% { transform: translateY(calc(var(--size) * 0.40)); }
      }
  </style>
</head>
<body>
  <div class="scene">
    <div id="ui"></div>
  </div>

  <script>
    // Create N floating “I love you” items (was multilingual; now all English)
    const N = 100;     // adjust if you want fewer/more
    const ui = document.getElementById('ui');

    for (let i = 1; i <= N; i++) {
      const love = document.createElement('div');
      love.className = 'love';
      love.style.setProperty('--i', i);

      const h = document.createElement('div');
      h.className = 'love_horizontal';

      const v = document.createElement('div');
      v.className = 'love_vertical';

      const word = document.createElement('div');
      word.className = 'love_word';
      word.textContent = 'Volim te Emina';

      v.appendChild(word);
      h.appendChild(v);
      love.appendChild(h);
      ui.appendChild(love);
    }
  </script>
</body>
</html>
