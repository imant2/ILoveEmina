<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VTP Emina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
      body {
  background: #000;
  height: 100vh;
  margin: 0;
  overflow: hidden;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  padding: 0;
}

.scene {
  position: relative;
  width: 100vw;
  height: 100svh;
  overflow: hidden;
  background: #000;
}

#ui {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 450px;
  height: 450px;
  transform: translate(-50%, -50%) scale(1);
  transform-origin: center center;
}

#ui .love {
  position: absolute;
  top: 50%;
  left: 50%;
  margin: -225px 0 0 -225px;
  --i: 1;
}
    @media (max-width: 768px) {
  #ui {
    transform: translate(-50%, -50%) scale(0.72);
  }
}

@media (max-width: 480px) {
  #ui {
    transform: translate(-50%, -50%) scale(0.52);
  }

  #ui .love_word {
    font-size: 1rem;
    letter-spacing: 1px;
  }
}
      
      @keyframes horizontal {
        from { transform: translateX(0); }
        to   { transform: translateX(var(--size)); }
      }
      
      @keyframes vertical {
        0%   { transform: translateY(calc(var(--size) * 0.40)); }
        10%  { transform: translateY(calc(var(--size) * 0.10)); }
        15%  { transform: translateY(calc(var(--size) * 0.01)); }
        18%  { transform: translateY(0); }
        20%  { transform: translateY(calc(var(--size) * 0.01)); }
        22%  { transform: translateY(calc(var(--size) * 0.077)); }
        24%  { transform: translateY(calc(var(--size) * 0.143)); }
        25%  { transform: translateY(calc(var(--size) * 0.25)); }
        26%  { transform: translateY(calc(var(--size) * 0.143)); }
        28%  { transform: translateY(calc(var(--size) * 0.077)); }
        30%  { transform: translateY(calc(var(--size) * 0.01)); }
        32%  { transform: translateY(0); }
        35%  { transform: translateY(calc(var(--size) * 0.01)); }
        40%  { transform: translateY(calc(var(--size) * 0.10)); }
        50%  { transform: translateY(calc(var(--size) * 0.40)); }
        71%  { transform: translateY(calc(var(--size) * 0.952)); }
        72.5%{ transform: translateY(calc(var(--size) * 0.98)); }
        75%  { transform: translateY(var(--size)); }
        77.5%{ transform: translateY(calc(var(--size) * 0.98)); }
        79%  { transform: translateY(calc(var(--size) * 0.952)); }
        100% { transform: translateY(calc(var(--size) * 0.40)); }
      }
  </style>
</head>
<body>
  <div class="scene">
    <div id="ui"></div>
  </div>

  <script>
    // Create N floating “I love you” items (was multilingual; now all English)
    const N = 100;     // adjust if you want fewer/more
    const ui = document.getElementById('ui');

    for (let i = 1; i <= N; i++) {
      const love = document.createElement('div');
      love.className = 'love';
      love.style.setProperty('--i', i);

      const h = document.createElement('div');
      h.className = 'love_horizontal';

      const v = document.createElement('div');
      v.className = 'love_vertical';

      const word = document.createElement('div');
      word.className = 'love_word';
      word.textContent = 'Volim te Emina';

      v.appendChild(word);
      h.appendChild(v);
      love.appendChild(h);
      ui.appendChild(love);
    }
  </script>
</body>
</html>
